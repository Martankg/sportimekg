<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sportime - Твое время. Твой спорт. Твои победы.</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

header{
background:#111;
padding:20px 10%;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #d8ff00;
}

.logo{
font-size:32px;
font-weight:bold;
color:#d8ff00;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
height:500px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:24px;
color:#d8ff00;
}

.news{
padding:60px 10%;
}

.news h2{
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #222;
}

.card h3{
margin-bottom:10px;
color:#d8ff00;
}

footer{
padding:30px;
text-align:center;
border-top:1px solid #222;
margin-top:50px;
}
</style>
</head>

<body>

<header>
<div class="logo">SPORTIME</div>

<nav>
<a href="#">Главная</a>
<a href="#">Футбол</a>
<a href="#">Матчи</a>
<a href="#">Таблицы</a>
<a href="#">Контакты</a>
</nav>
</header>

<section class="hero">
<h1>SPORTIME</h1>
<p>Твое время. Твой спорт. Твои победы.</p>
</section>

<section class="news">
<h2>Последние новости</h2>

<div class="cards">

<div class="card">
<h3>Кыргызский футбол</h3>
<p>Последние новости чемпионата Кыргызстана.</p>
</div>

<div class="card">
<h3>Лига Чемпионов</h3>
<p>Результаты матчей и аналитика.</p>
</div>

<div class="card">
<h3>АПЛ</h3>
<p>Новости английской Премьер-лиги.</p>
</div>

</div>
</section>

<footer>
© 2026 SPORTIME.KG
</footer>

</body>
</html>
